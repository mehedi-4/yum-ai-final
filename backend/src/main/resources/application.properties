# YumAI backend - default profile is "dev" (H2, zero-setup local run).
# Production deployments must run with --spring.profiles.active=prod (MySQL, per SRS 2.1).
spring.profiles.default=dev

spring.application.name=yumai-backend
server.port=8080

# JWT (FR-01.2). Override the secret in any real deployment.
yumai.jwt.secret=${JWT_SECRET:yumai-dev-secret-key-change-me-in-production-0123456789abcdef}
yumai.jwt.expiration-ms=86400000

# Billing (FR-02.3, ER-03)
yumai.billing.tax-rate=0.10

# Google Gemini API (FR-05). Leave the key empty to use the built-in
# statistical fallback engine (AI endpoints still work, without the LLM).
yumai.gemini.api-key=${GEMINI_API_KEY:}
yumai.gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
yumai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# CORS - frontend dev server origins
yumai.cors.allowed-origins=http://localhost:5173,http://localhost:3000
