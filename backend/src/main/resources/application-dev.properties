# Local development: file-based H2 so data survives restarts.
spring.datasource.url=jdbc:h2:file:./data/yumai;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed demo users/menu/inventory on first start
yumai.seed.enabled=true
