# Production: MySQL (SRS 2.1). Configure via environment variables.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/yumai?createDatabaseIfNotExist=true&useSSL=true}
spring.datasource.username=${MYSQL_USER:yumai}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

yumai.seed.enabled=${YUMAI_SEED:true}
